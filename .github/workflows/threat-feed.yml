name: Generate Live Cyber Threat Matrix

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour on the hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch Live Telemetry and Build Matrix
        run: |
          import urllib.request
          import json
          import re
          from datetime import datetime

          try:
              with urllib.request.urlopen("https://feodotracker.abuse.ch/downloads/ipblocklist.json") as url:
                  data = json.loads(url.read().decode())[:6]
          except Exception:
              data = [
                  {"ip_address": "185.220.101.5", "status": "online", "as_name": "Tor Exit Node Tracking"}, 
                  {"ip_address": "45.145.117.82", "status": "active", "as_name": "Mass Scanner Pool"}
              ]

          timestamp = datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          
          matrix_output = "### 📡 Live Cyber Threat Intelligence Matrix\n"
          matrix_output += f"> **Last Updated:** `{timestamp}` | *Live telemetry pipeline streaming global node active attacks.*\n\n"
          matrix_output += "```text\n"
          matrix_output += "┌───────────────────┬────────────┬─────────────────────────────┐\n"
          matrix_output += "│ TARGET NODE IP    │ STATUS     │ IDENTIFIED VULNERABILITY    │\n"
          matrix_output += "├───────────────────┼────────────┼─────────────────────────────┤\n"
          
          for idx, item in enumerate(data):
              ip = item.get('ip_address', 'Unknown IP')[:15].ljust(17)
              status = "ATTACKING".ljust(10)
              desc = item.get('as_name', 'Malicious C2 Node Activity')[:25].ljust(27)
              matrix_output += f"│ {ip} │ {status} │ {desc} │\n"
              
          matrix_output += "└───────────────────┴────────────┴─────────────────────────────┘\n"
          matrix_output += "```\n"
          matrix_output += "![Live Traffic Flow](https://github-readme-activity-graph.vercel.app/graph?username=PicasoThedeal&theme=react-dark&area=true&custom_title=System%20Firewall%20Throughput)\n"

          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          # Bulletproof replacement that works regardless of line break spacing variations
          pattern = r"<!--\s*START_THREAT_DATA\s*-->[\s\S]*?<!--\s*END_THREAT_DATA\s*-->"
          replacement = f"<!-- START_THREAT_DATA -->\n{matrix_output}\n<!-- END_THREAT_DATA -->"
          
          updated_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_readme)
        shell: python

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "chore: telemetry database update [skip ci]"
          git push
